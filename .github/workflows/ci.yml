name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck / test / build / lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        # Astro requires Node v22.12.0 or higher (even-numbered majors only).
        # See https://docs.astro.build/en/install-and-setup/
        # Without this, the runner's default Node 20 makes astro sync fail
        # with "Node.js v20 is not supported by Astro!".
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Cache Bun install
        # Default cache path per `bun pm cache`. Keyed on bun.lock so any
        # dependency change invalidates. setup-bun@v2's own cache covers
        # only the Bun executable, not the install cache.
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-cache-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        # `astro check` runs TypeScript diagnostics across .ts/.tsx/.astro
        # files AND syncs Astro's generated types as part of the same run.
        # See https://docs.astro.build/en/reference/cli-reference/#astro-check
        # No separate `tsc --noEmit` step: astro check covers it.
        run: bun run check-types

      - name: Lint and format check
        run: bunx biome check .

      - name: Validate level data
        run: bun run validate:levels

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build
