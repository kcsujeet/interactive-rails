name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck / test / build / lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        # Astro requires Node v22.12.0 or higher (even-numbered majors only).
        # See https://docs.astro.build/en/install-and-setup/
        # Without this, the runner's default Node 20 makes astro sync fail
        # with "Node.js v20 is not supported by Astro!".
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Astro types
        # Generates .astro/types.d.ts which references astro/client and
        # registers CSS side-effect module declarations. Required before
        # tsc --noEmit. See https://docs.astro.build/en/reference/cli-reference/#astro-sync
        run: bunx astro sync

      - name: TypeScript type check
        run: bunx tsc --noEmit

      - name: Astro type check
        run: bun run check-types

      - name: Lint and format check
        run: bunx biome check .

      - name: Validate level data
        run: bun run validate:levels

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build
